<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Judol Detector AyamMerdeka</title>
    <link rel="stylesheet" href="styles/popup.css" />
  </head>
  <body>
    <header class="popup-header">
      <img
        src="images/icon48.png"
        alt="Judol Detector Icon"
        class="popup-logo"
      />
      <div>
        <h1>Judol Detector</h1>
        <p>AyamMerdeka</p>
      </div>
    </header>

    <div class="card">
      <div class="stat">
        <span>Total match</span>
        <strong id="total-matches">-</strong>
      </div>
      <div class="muted" id="page-title">-</div>
      <div class="muted" id="page-url">-</div>
      <div class="muted" id="updated-at">-</div>
    </div>

    <div class="card">
      <strong>Actions</strong>
      
      <div class="toggle-container">
        <label for="blur-toggle">Aktifkan Sensor Blur</label>
        <input type="checkbox" id="blur-toggle" checked />
      </div>

      <button id="rescan-button">Rescan Page</button>
      <div class="muted" id="rescan-status">-</div>
    </div>

    <div class="card">
      <strong>Match per Algoritma</strong>
      <div id="algorithm-stats"></div>
    </div>

    <div class="card">
      <strong>Perbandingan Keyword</strong>
      <div id="keyword-stats"></div>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
